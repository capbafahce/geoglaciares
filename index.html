<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGlaciares - Proyecto de Ciencia (Colegio Estudiantes de La Plata)</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        
        /* Header con guiño a los colores de Estudiantes (Rojo y Blanco) */
        #header { 
            height: 60px; 
            background: #cc0000; /* Rojo Pincha */
            color: white; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            font-size: 20px; 
            font-weight: bold; 
            z-index: 1000;
            border-bottom: 4px solid #ffffff;
        }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 280px; background: #f8f9fa; border-right: 1px solid #ddd; padding: 20px; z-index: 999; display: flex; flex-direction: column; justify-content: space-between; }
        #map { flex: 1; }

        /* Estilos de los controles de capas */
        .layer-control { margin-bottom: 15px; padding: 10px; background: white; border: 1px solid #eee; border-radius: 8px; display: flex; align-items: center; cursor: pointer; }
        .layer-control:hover { background: #f0f0f0; }
        .layer-control input { margin-right: 12px; transform: scale(1.2); }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        .icon-provincia { color: #e67e22; } /* Naranja para límites */
        .icon-glaciar { color: #00e5ff; }   /* Cyan para hielo */
    </style>
</head>
<body>

    <div id="header">
        GeoGlaciares: Inventario y Geografía de nuestros cuerpos de hielo
    </div>

    <div id="main-container">
        <div id="sidebar">
            <div>
                <h3 style="margin-top: 0; color: #2c3e50;">Proyecto de Ciencia</h3>
                <p style="font-size: 13px; color: #555; font-weight: bold;">Colegio Estudiantes de La Plata</p>
                
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
                
                <h4 style="color: #333; margin-bottom: 10px;">Capas Escolares</h4>
                
                <div class="layer-control">
                    <label style="display: flex; align-items: center; cursor: pointer; width: 100%;">
                        <input type="checkbox" id="checkProvincias" checked> 
                        <span class="material-symbols-outlined icon-provincia" style="margin-right: 8px;">map</span> Provincias con Glaciares
                    </label>
                </div>

                <div class="layer-control">
                    <label style="display: flex; align-items: center; cursor: pointer; width: 100%;">
                        <input type="checkbox" id="checkGlaciares" checked> 
                        <span class="material-symbols-outlined icon-glaciar" style="margin-right: 8px;">ac_unit</span> Glaciares (Polígonos)
                    </label>
                </div>
            </div>

            <div>
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
                <p style="font-size: 12px; color: #666; line-height: 1.4;">
                    Sabías que Argentina cuenta con un inventario de más de 18 mil cuerpos de hielo y nieve que protegen nuestras reservas estratégicas de agua hídrica.
                </p>
            </div>
        </div>
        
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Fondo satelital para apreciar el hielo real de la cordillera
        var googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20, 
            subdomains: ['mt0','mt1','mt2','mt3'],
            attribution: 'Map data &copy; Google'
        });

        // Centrado inicial en la Cordillera Argentina
        var map = L.map('map', { center: [-40.0, -71.0], zoom: 5, layers: [googleSat] });

        var provinciasLayer = L.layerGroup().addTo(map);
        var glaciaresLayer = L.layerGroup().addTo(map);

        // --- CARGA DE PROVINCIAS CON GLACIARES ---
        // Debes tener un archivo 'provincias_glaciares.geojson' en tu repo
        fetch('provincias_glaciares.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: "#e67e22",
                        weight: 2,
                        dashArray: "5, 5", // Línea punteada para límites provinciales
                        fillOpacity: 0.1,
                        fillColor: "#e67e22"
                    },
                    onEachFeature: (f, l) => {
                        let provNombre = f.properties.provincia || f.properties.nam || "Provincia";
                        l.bindPopup(`<b>Provincia:</b> ${provNombre}`);
                    }
                }).addTo(provinciasLayer);
            })
            .catch(err => console.error("Error cargando provincias:", err));

        // --- CARGA DE POLÍGONOS DE GLACIARES ---
        // Al ser miles de polígonos, optimizamos el peso visual (weight: 1)
        fetch('glaciares_arg.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { 
                        color: "#00e5ff", 
                        weight: 1, 
                        fillColor: "#00e5ff", 
                        fillOpacity: 0.6 
                    },
                    onEachFeature: (f, l) => {
                        // Traemos el nombre (fna) y agregamos datos educativos si existen en tu GeoJSON (ej: superficie, cuenca)
                        let nombre = f.properties.fna || f.properties.nombre || "Glaciar innominado";
                        let area = f.properties.area_km2 ? `<br><b>Superficie:</b> ${f.properties.area_km2} km²` : "";
                        let clasificacion = f.properties.clase ? `<br><b>Tipo:</b> ${f.properties.clase}` : "";
                        
                        l.bindPopup(`
                            <div style="font-size: 13px;">
                                <b>Glaciar:</b> ${nombre}
                                ${area}
                                ${clasificacion}
                            </div>
                        `);
                    }
                }).addTo(glaciaresLayer);
            })
            .catch(err => console.error("Error cargando glaciares:", err));

        // Lógica interactiva de los Checkboxes escolares
        document.getElementById('checkProvincias').onchange = (e) => e.target.checked ? map.addLayer(provinciasLayer) : map.removeLayer(provinciasLayer);
        document.getElementById('checkGlaciares').onchange = (e) => e.target.checked ? map.addLayer(glaciaresLayer) : map.removeLayer(glaciaresLayer);

    </script>
</body>
</html>
