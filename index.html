<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGlaciares: visualizador de lo que se está debatiendo</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        #map {
            height: 100vh; /* Ocupa toda la altura de la ventana */
            width: 100%;
        }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>

        var map = L.map('map').setView([-34.6098069569562, -58.39274620522128], 500);

       // MAPAS BASE

var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
});

var googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3'],
    attribution: 'Map data &copy;2024 Google'
});

// Inicializar el mapa con una de las capas
var map = L.map('map', {
    center: [-34.6037, -58.3816],
    zoom: 13,
    layers: [googleSat]
});

var baseMaps = {
    "OpenStreetMap": osm,
    "Google Satélite": googleSat
};
L.control.layers(baseMaps).addTo(map);

        var marker = L.marker([-34.6098069569562, -58.39274620522128]).addTo(map);
        
        marker.bindPopup("<b>¡Hola!</b><br>Acá se está debatiendo").openPopup();
fetch('glaciares.geojson')
    .then(response => response.json())
    .then(data => {
        L.geoJSON(data, {
            style: function (feature) {
                return {
                    color: "red",     
                    weight: 2,         
                    fillOpacity: 0.5  
                };
            },
            onEachFeature: function (feature, layer) {
                if (feature.properties && feature.properties.fna) {
                    layer.bindPopup(feature.properties.fna);
                }
            }
        }).addTo(map);
    })
    .catch(error => console.error('Error cargando el GeoJSON:', error));
        fetch('minas.geojson')
    .then(response => response.json())
    .then(data => {
        L.geoJSON(data, {
            style: function (feature) {
                return {
                    color: "red",     
                    weight: 2,         
                    fillOpacity: 0.5  
                };
            },
            onEachFeature: function (feature, layer) {
                if (feature.properties && feature.properties.gna) {
                    layer.bindPopup(feature.properties.gna);
                }
            }
        }).addTo(map);
    })
    .catch(error => console.error('Error cargando el GeoJSON:', error));
    </script>
</body>
</html>
