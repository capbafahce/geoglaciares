<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGlaciares</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        
        /* Barra superior */
        #header {
            height: 60px;
            background: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        #main-container {
            display: flex;
            flex: 1; /* Ocupa el resto de la pantalla */
            overflow: hidden;
        }

        /* Panel lateral de filtros */
        #sidebar {
            width: 250px;
            background: #f8f9fa;
            border-right: 1px solid #ddd;
            padding: 20px;
            z-index: 999;
        }

        #map {
            flex: 1; /* El mapa toma el espacio restante */
        }

        h3 { margin-top: 0; font-size: 18px; }
        .filter-group { margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="header">GeoGlaciares: un visualizador de lo que se está debatiendo</div>

    <div id="main-container">
        <div id="sidebar">
            <h3>Capas y Filtros</h3>
            <div class="filter-group">
                <p>Usa el control arriba a la derecha en el mapa para alternar capas base y superpuestas.</p>
            </div>
            <hr>
            <p style="font-size: 12px; color: #666;">
                Visualizador de glaciares y proyectos mineros en discusión.
            </p>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- MAPAS BASE ---
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        });

        var googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3'],
            attribution: 'Map data &copy;2024 Google'
        });

        // Ajusté el zoom inicial a 5 para ver todo el país, centrado en el Congreso
        var map = L.map('map', {
            center: [-34.6098, -58.3927], 
            zoom: 5,
            layers: [googleSat]
        });

        // --- MARCADOR DEL DEBATE ---
        var marker = L.marker([-34.6098, -58.3927]).addTo(map);
        marker.bindPopup("<b>¡Hola!</b><br>Acá se está debatiendo. Si querés ver lo que está en juego, dirigite a la cordillera.").openPopup();

        // --- CARGA DE CAPAS GEODATA ---

        // 1. Glaciares
        var glaciaresLayer = L.layerGroup();
        fetch('glaciares.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "cyan", weight: 2, fillOpacity: 0.6 },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.fna) {
                            layer.bindPopup("<b>Glaciar:</b> " + feature.properties.fna);
                        }
                    }
                }).addTo(glaciaresLayer);
            });

        // 2. Minas
        var minasLayer = L.layerGroup();
        fetch('minas.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "red", weight: 2, fillOpacity: 0.5 },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.fna) {
                            layer.bindPopup("<b>Proyecto Minero:</b> " + feature.properties.fna);
                        }
                    }
                }).addTo(minasLayer);
            });

        // --- CONTROL DE CAPAS (Base y Superpuestas) ---
        var baseMaps = {
            "Google Satélite": googleSat,
            "OpenStreetMap": osm
        };

        var overlayMaps = {
            "Glaciares": glaciaresLayer,
            "Proyectos Mineros": minasLayer
        };

        L.control.layers(baseMaps, overlayMaps).addTo(map);
        
        // Activar capas por defecto
        glaciaresLayer.addTo(map);
        minasLayer.addTo(map);

    </script>
</body>
</html>
